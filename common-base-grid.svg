<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .grid-faint { stroke: #2a2a2a; stroke-width: 0.5; fill: none; }
      .grid-light { stroke: #444; stroke-width: 0.5; fill: none; }
      .grid-medium { stroke: #666; stroke-width: 1; fill: none; }
      .grid-bold { stroke: #888; stroke-width: 1.5; fill: none; }
      .label { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 9px; fill: #555; }
      .title { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 16px; fill: #ccc; font-weight: 600; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 11px; fill: #777; }
      .annotation { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 10px; fill: #999; }
      .measure { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 8px; fill: #444; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="900" fill="#111"/>
  
  <!-- ==================== MAIN GRID DEMO (Center) ==================== -->
  <!-- 3:4 ratio canvas (180x240 scaled up to 360x480 for visibility) -->
  <g transform="translate(420, 60)">
    <text x="180" y="-35" text-anchor="middle" class="title">COMMON BASE GRID</text>
    <text x="180" y="-18" text-anchor="middle" class="subtitle">12×16 Modular System (3:4 Ratio)</text>
    
    <!-- Canvas outline -->
    <rect x="0" y="0" width="360" height="480" fill="none" stroke="#333" stroke-width="2"/>
    
    <!-- MARGINS (Safe area) -->
    <rect x="20" y="20" width="320" height="440" fill="none" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="180" y="10" text-anchor="middle" class="measure">360×480 (3:4)</text>
    <text x="180" y="500" text-anchor="middle" class="measure">12 columns × 16 rows = 192 modules</text>
    
    <!-- ==================== COLUMN GRID (12 columns) ==================== -->
    <!-- Each column = 30px -->
    <g opacity="0.4">
      <line x1="30" y1="0" x2="30" y2="480" class="grid-faint"/>
      <line x1="60" y1="0" x2="60" y2="480" class="grid-faint"/>
      <line x1="90" y1="0" x2="90" y2="480" class="grid-light"/>
      <line x1="120" y1="0" x2="120" y2="480" class="grid-faint"/>
      <line x1="150" y1="0" x2="150" y2="480" class="grid-faint"/>
      <line x1="180" y1="0" x2="180" y2="480" class="grid-medium"/> <!-- Center -->
      <line x1="210" y1="0" x2="210" y2="480" class="grid-faint"/>
      <line x1="240" y1="0" x2="240" y2="480" class="grid-faint"/>
      <line x1="270" y1="0" x2="270" y2="480" class="grid-light"/>
      <line x1="300" y1="0" x2="300" y2="480" class="grid-faint"/>
      <line x1="330" y1="0" x2="330" y2="480" class="grid-faint"/>
    </g>
    
    <!-- ==================== ROW GRID (16 rows) ==================== -->
    <!-- Each row = 30px -->
    <g opacity="0.4">
      <line x1="0" y1="30" x2="360" y2="30" class="grid-faint"/>
      <line x1="0" y1="60" x2="360" y2="60" class="grid-light"/>
      <line x1="0" y1="90" x2="360" y2="90" class="grid-faint"/>
      <line x1="0" y1="120" x2="360" y2="120" class="grid-medium"/> <!-- Third -->
      <line x1="0" y1="150" x2="360" y2="150" class="grid-faint"/>
      <line x1="0" y1="180" x2="360" y2="180" class="grid-light"/>
      <line x1="0" y1="210" x2="360" y2="210" class="grid-faint"/>
      <line x1="0" y1="240" x2="360" y2="240" class="grid-medium"/> <!-- Center -->
      <line x1="0" y1="270" x2="360" y2="270" class="grid-faint"/>
      <line x1="0" y1="300" x2="360" y2="300" class="grid-light"/>
      <line x1="0" y1="330" x2="360" y2="330" class="grid-faint"/>
      <line x1="0" y1="360" x2="360" y2="360" class="grid-medium"/> <!-- Third -->
      <line x1="0" y1="390" x2="360" y2="390" class="grid-faint"/>
      <line x1="0" y1="420" x2="360" y2="420" class="grid-light"/>
      <line x1="0" y1="450" x2="360" y2="450" class="grid-faint"/>
    </g>
    
    <!-- ==================== PRIMARY DIVISIONS ==================== -->
    <!-- Thirds (classic photography grid) -->
    <line x1="120" y1="0" x2="120" y2="480" class="grid-bold"/>
    <line x1="240" y1="0" x2="240" y2="480" class="grid-bold"/>
    <line x1="0" y1="160" x2="360" y2="160" class="grid-bold"/>
    <line x1="0" y1="320" x2="360" y2="320" class="grid-bold"/>
    
    <!-- Golden ratio lines (primary composition guides) -->
    <line x1="222" y1="0" x2="222" y2="480" class="grid-bold" stroke-dasharray="8,4" opacity="0.5"/>
    <line x1="0" y1="297" x2="360" y2="297" class="grid-bold" stroke-dasharray="8,4" opacity="0.5"/>
    
    <!-- ==================== ANNOTATION LABELS ==================== -->
    <!-- Column markers -->
    <text x="15" y="-5" text-anchor="middle" class="measure">1</text>
    <text x="45" y="-5" text-anchor="middle" class="measure">2</text>
    <text x="75" y="-5" text-anchor="middle" class="measure">3</text>
    <text x="105" y="-5" text-anchor="middle" class="measure">4</text>
    <text x="135" y="-5" text-anchor="middle" class="measure">5</text>
    <text x="165" y="-5" text-anchor="middle" class="measure">6</text>
    <text x="195" y="-5" text-anchor="middle" class="measure">7</text>
    <text x="225" y="-5" text-anchor="middle" class="measure">8</text>
    <text x="255" y="-5" text-anchor="middle" class="measure">9</text>
    <text x="285" y="-5" text-anchor="middle" class="measure">10</text>
    <text x="315" y="-5" text-anchor="middle" class="measure">11</text>
    <text x="345" y="-5" text-anchor="middle" class="measure">12</text>
    
    <!-- Row markers -->
    <text x="-8" y="20" text-anchor="end" class="measure">1</text>
    <text x="-8" y="50" text-anchor="end" class="measure">2</text>
    <text x="-8" y="80" text-anchor="end" class="measure">3</text>
    <text x="-8" y="110" text-anchor="end" class="measure">4</text>
    <text x="-8" y="140" text-anchor="end" class="measure">5</text>
    <text x="-8" y="170" text-anchor="end" class="measure">6</text>
    <text x="-8" y="200" text-anchor="end" class="measure">7</text>
    <text x="-8" y="230" text-anchor="end" class="measure">8</text>
    <text x="-8" y="260" text-anchor="end" class="measure">9</text>
    <text x="-8" y="290" text-anchor="end" class="measure">10</text>
    <text x="-8" y="320" text-anchor="end" class="measure">11</text>
    <text x="-8" y="350" text-anchor="end" class="measure">12</text>
    <text x="-8" y="380" text-anchor="end" class="measure">13</text>
    <text x="-8" y="410" text-anchor="end" class="measure">14</text>
    <text x="-8" y="440" text-anchor="end" class="measure">15</text>
    <text x="-8" y="470" text-anchor="end" class="measure">16</text>
    
    <!-- Typography zone -->
    <rect x="20" y="20" width="320" height="70" fill="#1a1a1a" opacity="0.3"/>
    <text x="180" y="55" text-anchor="middle" class="annotation">TYPOGRAPHY ZONE</text>
    
    <!-- Visual zone -->
    <rect x="20" y="100" width="320" height="360" fill="#1a1a1a" opacity="0.3"/>
    <text x="180" y="280" text-anchor="middle" class="annotation">VISUAL PATTERN ZONE</text>
  </g>
  
  <!-- ==================== RIGHT PANEL: GRID SYSTEMS ==================== -->
  <g transform="translate(820, 80)">
    <text x="0" y="0" class="title">GRID DERIVATIVES</text>
    <text x="0" y="20" class="subtitle">How materials map to base 12×16</text>
    
    <!-- Material mapping list -->
    <g transform="translate(0, 50)">
      <text x="0" y="0" class="annotation" fill="#aaa">GLASS</text>
      <text x="0" y="15" class="label">• Diagonal: 12×16 triangle divisions</text>
      <text x="0" y="30" class="label">• Overlay on 4×4 modular zones</text>
      
      <text x="0" y="55" class="annotation" fill="#aaa">CARPETS</text>
      <text x="0" y="70" class="label">• Radial: Center at (6,8)</text>
      <text x="0" y="85" class="label">• Radii at 30/60/90px (1/2/3 cols)</text>
      
      <text x="0" y="110" class="annotation" fill="#aaa">POLYCARBONATE</text>
      <text x="0" y="125" class="label">• Verticals: Every 2 cols (6 strips)</text>
      <text x="0" y="140" class="label">• Heavy at cols 3, 6, 9</text>
      
      <text x="0" y="165" class="annotation" fill="#aaa">GOLD</text>
      <text x="0" y="180" class="label">• Golden: 0.618 at col 7.4</text>
      <text x="0" y="195" class="label">• Nested rectangles offset 20px</text>
      
      <text x="0" y="220" class="annotation" fill="#aaa">BAMBOO</text>
      <text x="0" y="235" class="label">• Organic: Cols 1.3, 3, 4.7, 6.7</text>
      <text x="0" y="250" class="label">• Nodes at rows 3, 7, 11</text>
      
      <text x="0" y="275" class="annotation" fill="#aaa">BRICKS</text>
      <text x="0" y="290" class="label">• Running bond: 4 rows</text>
      <text x="0" y="305" class="label">• Offset 50% every row</text>
      
      <text x="0" y="330" class="annotation" fill="#aaa">ICE</text>
      <text x="0" y="345" class="label">• Shards: 60° angles from center</text>
      <text x="0" y="360" class="label">• Fractures at row 4, 8, 12</text>
      
      <text x="0" y="385" class="annotation" fill="#aaa">PLASTER</text>
      <text x="0" y="400" class="label">• 3×3 main, subdivided center</text>
      <text x="0" y="415" class="label">• Irregular: Cols 4, 8 + Rows 4, 12</text>
    </g>
  </g>
  
  <!-- ==================== LEFT PANEL: SPECIFICATIONS ==================== -->
  <g transform="translate(60, 80)">
    <text x="0" y="0" class="title">BASE SPEC</text>
    
    <g transform="translate(0, 30)">
      <text x="0" y="0" class="annotation" fill="#aaa">DIMENSIONS</text>
      <text x="0" y="18" class="label">Canvas: 360 × 480 px</text>
      <text x="0" y="33" class="label">Ratio: 3:4 (portrait)</text>
      <text x="0" y="48" class="label">Safe margin: 20px</text>
      <text x="0" y="63" class="label">Live area: 320 × 440 px</text>
      
      <text x="0" y="95" class="annotation" fill="#aaa">GRID UNITS</text>
      <text x="0" y="113" class="label">Columns: 12 (30px each)</text>
      <text x="0" y="128" class="label">Rows: 16 (30px each)</text>
      <text x="0" y="143" class="label">Module: 30 × 30 px</text>
      <text x="0" y="158" class="label">Total modules: 192</text>
      
      <text x="0" y="190" class="annotation" fill="#aaa">KEY LINES</text>
      <text x="0" y="208" class="label">Center: Col 6 / Row 8</text>
      <text x="0" y="223" class="label">Thirds: Col 4, 8 / Row 5, 11</text>
      <text x="0" y="238" class="label">Golden: Col 7.4 / Row 9.9</text>
      
      <text x="0" y="270" class="annotation" fill="#aaa">TYPOGRAPHY</text>
      <text x="0" y="288" class="label">Title zone: Rows 1–3</text>
      <text x="0" y="303" class="label">Visual zone: Rows 4–16</text>
      <text x="0" y="318" class="label">Baseline grid: 30px</text>
      
      <text x="0" y="350" class="annotation" fill="#aaa">ZONES</text>
      <rect x="0" y="365" width="280" height="65" fill="none" stroke="#444" stroke-width="1"/>
      <rect x="0" y="365" width="280" height="20" fill="#222" opacity="0.5"/>
      <text x="5" y="379" class="label">HEADER (Title/Subtitle)</text>
      <text x="5" y="404" class="label">BODY (Visual pattern)</text>
      <text x="5" y="421" class="label">BASELINE (Optional)</text>
      <line x1="0" y1="385" x2="280" y2="385" stroke="#444" stroke-width="1"/>
      <line x1="0" y1="415" x2="280" y2="415" stroke="#444" stroke-dasharray="4,2" stroke-width="0.5"/>
    </g>
  </g>
  
  <!-- ==================== BOTTOM: SCALE REFERENCE ==================== -->
  <g transform="translate(420, 580)">
    <text x="180" y="0" text-anchor="middle" class="subtitle">SCALE REFERENCE: All 8 posters use this base</text>
    
    <!-- Mini thumbnails showing grid overlay -->
    <g transform="translate(0, 20)">
      <!-- Glass -->
      <g transform="translate(0, 0)">
        <rect width="80" height="107" fill="none" stroke="#333"/>
        <line x1="27" y1="0" x2="0" y2="107" stroke="#444" stroke-width="0.5"/>
        <line x1="53" y1="0" x2="80" y2="107" stroke="#444" stroke-width="0.5"/>
        <text x="40" y="122" text-anchor="middle" class="label">Glass</text>
      </g>
      
      <!-- Carpets -->
      <g transform="translate(90, 0)">
        <rect width="80" height="107" fill="none" stroke="#333"/>
        <circle cx="40" cy="54" r="27" fill="none" stroke="#444" stroke-width="0.5"/>
        <text x="40" y="122" text-anchor="middle" class="label">Carpets</text>
      </g>
      
      <!-- Polycarbonate -->
      <g transform="translate(180, 0)">
        <rect width="80" height="107" fill="none" stroke="#333"/>
        <line x1="20" y1="0" x2="20" y2="107" stroke="#444" stroke-width="0.5"/>
        <line x1="40" y1="0" x2="40" y2="107" stroke="#444" stroke-width="1"/>
        <line x1="60" y1="0" x2="60" y2="107" stroke="#444" stroke-width="0.5"/>
        <text x="40" y="122" text-anchor="middle" class="label">Poly</text>
      </g>
      
      <!-- Gold -->
      <g transform="translate(270, 0)">
        <rect width="80" height="107" fill="none" stroke="#333"/>
        <rect x="10" y="14" width="60" height="80" fill="none" stroke="#444" stroke-width="0.5"/>
        <text x="40" y="122" text-anchor="middle" class="label">Gold</text>
      </g>
    </g>
  </g>
  
</svg>