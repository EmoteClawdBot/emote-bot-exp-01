<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .grid-line { stroke: #333; stroke-width: 0.5; fill: none; }
      .grid-bold { stroke: #666; stroke-width: 1; fill: none; }
      .label { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 10px; fill: #888; }
      .title { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; fill: #ccc; font-weight: 600; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="900" fill="#1a1a1a"/>
  
  <!-- Poster dimensions: 180x240 each, arranged 2x4 -->
  <!-- Margins: 40px sides, 60px between posters -->
  
  <!-- ==================== ROW 1 ==================== -->
  
  <!-- 1. GLASS (Blue) - Diagonal split grid -->
  <g transform="translate(80, 80)">
    <rect width="180" height="240" fill="none" stroke="#444" stroke-width="1"/>
    <text x="90" y="-15" text-anchor="middle" class="title">GLASS</text>
    <!-- Base 4x4 grid -->
    <line x1="45" y1="0" x2="45" y2="240" class="grid-line"/>
    <line x1="90" y1="0" x2="90" y2="240" class="grid-line"/>
    <line x1="135" y1="0" x2="135" y2="240" class="grid-line"/>
    <line x1="0" y1="60" x2="180" y2="60" class="grid-line"/>
    <line x1="0" y1="120" x2="180" y2="120" class="grid-line"/>
    <line x1="0" y1="180" x2="180" y2="180" class="grid-line"/>
    <!-- Diagonal guides -->
    <line x1="0" y1="0" x2="180" y2="240" class="grid-bold"/>
    <line x1="180" y1="0" x2="0" y2="240" class="grid-bold"/>
  </g>
  
  <!-- 2. CARPETS (Red) - Radial/Circular grid -->
  <g transform="translate(320, 80)">
    <rect width="180" height="240" fill="none" stroke="#444" stroke-width="1"/>
    <text x="90" y="-15" text-anchor="middle" class="title">CARPETS</text>
    <!-- Concentric circles -->
    <circle cx="90" cy="120" r="30" class="grid-line"/>
    <circle cx="90" cy="120" r="60" class="grid-line"/>
    <circle cx="90" cy="120" r="90" class="grid-bold"/>
    <!-- Radial lines -->
    <line x1="90" y1="0" x2="90" y2="240" class="grid-line"/>
    <line x1="0" y1="120" x2="180" y2="120" class="grid-line"/>
    <line x1="22.5" y1="30" x2="157.5" y2="210" class="grid-line"/>
    <line x1="157.5" y1="30" x2="22.5" y2="210" class="grid-line"/>
  </g>
  
  <!-- 3. POLYCARBONATE (Purple) - Vertical strip grid -->
  <g transform="translate(560, 80)">
    <rect width="180" height="240" fill="none" stroke="#444" stroke-width="1"/>
    <text x="90" y="-15" text-anchor="middle" class="title">POLYCARBONATE</text>
    <!-- Vertical strips - 6 columns -->
    <line x1="30" y1="0" x2="30" y2="240" class="grid-bold"/>
    <line x1="60" y1="0" x2="60" y2="240" class="grid-line"/>
    <line x1="90" y1="0" x2="90" y2="240" class="grid-bold"/>
    <line x1="120" y1="0" x2="120" y2="240" class="grid-line"/>
    <line x1="150" y1="0" x2="150" y2="240" class="grid-bold"/>
    <!-- Horizontal thirds -->
    <line x1="0" y1="80" x2="180" y2="80" class="grid-line"/>
    <line x1="0" y1="160" x2="180" y2="160" class="grid-line"/>
  </g>
  
  <!-- 4. GOLD (Yellow) - Overlapping rectangle grid -->
  <g transform="translate(800, 80)">
    <rect width="180" height="240" fill="none" stroke="#444" stroke-width="1"/>
    <text x="90" y="-15" text-anchor="middle" class="title">GOLD</text>
    <!-- Golden ratio divisions -->
    <line x1="111" y1="0" x2="111" y2="240" class="grid-bold"/>
    <line x1="0" y1="148" x2="180" y2="148" class="grid-bold"/>
    <!-- Offset grid -->
    <rect x="20" y="20" width="140" height="200" class="grid-line"/>
    <rect x="40" y="40" width="100" height="160" class="grid-line"/>
    <line x1="0" y1="120" x2="180" y2="120" class="grid-line"/>
  </g>
  
  <!-- ==================== ROW 2 ==================== -->
  
  <!-- 5. BAMBOO (Green) - Vertical organic strips -->
  <g transform="translate(80, 420)">
    <rect width="180" height="240" fill="none" stroke="#444" stroke-width="1"/>
    <text x="90" y="-15" text-anchor="middle" class="title">BAMBOO</text>
    <!-- Bamboo stalk spacing - irregular verticals -->
    <line x1="20" y1="0" x2="20" y2="240" class="grid-bold"/>
    <line x1="45" y1="0" x2="45" y2="240" class="grid-line"/>
    <line x1="70" y1="0" x2="70" y2="240" class="grid-bold"/>
    <line x1="100" y1="0" x2="100" y2="240" class="grid-line"/>
    <line x1="130" y1="0" x2="130" y2="240" class="grid-bold"/>
    <line x1="160" y1="0" x2="160" y2="240" class="grid-line"/>
    <!-- Horizontal nodes -->
    <line x1="0" y1="60" x2="180" y2="60" class="grid-line"/>
    <line x1="0" y1="120" x2="180" y2="120" class="grid-line"/>
    <line x1="0" y1="180" x2="180" y2="180" class="grid-line"/>
  </g>
  
  <!-- 6. BRICKS (Orange) - Brick pattern grid -->
  <g transform="translate(320, 420)">
    <rect width="180" height="240" fill="none" stroke="#444" stroke-width="1"/>
    <text x="90" y="-15" text-anchor="middle" class="title">BRICKS</text>
    <!-- Brick pattern - 4 rows, offset -->
    <line x1="0" y1="40" x2="180" y2="40" class="grid-bold"/>
    <line x1="0" y1="80" x2="180" y2="80" class="grid-bold"/>
    <line x1="0" y1="120" x2="180" y2="120" class="grid-bold"/>
    <line x1="0" y1="160" x2="180" y2="160" class="grid-bold"/>
    <line x1="0" y1="200" x2="180" y2="200" class="grid-bold"/>
    <!-- Verticals - alternating pattern -->
    <line x1="45" y1="0" x2="45" y2="40" class="grid-line"/>
    <line x1="90" y1="0" x2="90" y2="40" class="grid-line"/>
    <line x1="135" y1="0" x2="135" y2="40" class="grid-line"/>
    <line x1="22.5" y1="40" x2="22.5" y2="80" class="grid-line"/>
    <line x1="67.5" y1="40" x2="67.5" y2="80" class="grid-line"/>
    <line x1="112.5" y1="40" x2="112.5" y2="80" class="grid-line"/>
    <line x1="157.5" y1="40" x2="157.5" y2="80" class="grid-line"/>
  </g>
  
  <!-- 7. ICE (Light Blue) - Fractured/Shard grid -->
  <g transform="translate(560, 420)">
    <rect width="180" height="240" fill="none" stroke="#444" stroke-width="1"/>
    <text x="90" y="-15" text-anchor="middle" class="title">ICE</text>
    <!-- Angular fracture lines -->
    <line x1="0" y1="80" x2="60" y2="0" class="grid-bold"/>
    <line x1="60" y1="0" x2="120" y2="80" class="grid-bold"/>
    <line x1="120" y1="80" x2="180" y2="0" class="grid-bold"/>
    <line x1="0" y1="160" x2="90" y2="80" class="grid-bold"/>
    <line x1="90" y1="80" x2="180" y2="160" class="grid-bold"/>
    <line x1="0" y1="240" x2="60" y2="160" class="grid-bold"/>
    <line x1="60" y1="160" x2="120" y2="240" class="grid-bold"/>
    <line x1="120" y1="240" x2="180" y2="160" class="grid-bold"/>
    <!-- Center cross -->
    <line x1="90" y1="0" x2="90" y2="240" class="grid-line"/>
    <line x1="0" y1="120" x2="180" y2="120" class="grid-line"/>
  </g>
  
  <!-- 8. PLASTER (Pink) - Textured organic grid -->
  <g transform="translate(800, 420)">
    <rect width="180" height="240" fill="none" stroke="#444" stroke-width="1"/>
    <text x="90" y="-15" text-anchor="middle" class="title">PLASTER</text>
    <!-- Irregular grid with organic feel -->
    <line x1="0" y1="60" x2="180" y2="60" class="grid-bold"/>
    <line x1="0" y1="180" x2="180" y2="180" class="grid-bold"/>
    <line x1="60" y1="0" x2="60" y2="240" class="grid-bold"/>
    <line x1="120" y1="0" x2="120" y2="240" class="grid-bold"/>
    <!-- Subdivisions -->
    <line x1="30" y1="60" x2="30" y2="180" class="grid-line"/>
    <line x1="90" y1="60" x2="90" y2="180" class="grid-line"/>
    <line x1="150" y1="60" x2="150" y2="180" class="grid-line"/>
    <line x1="60" y1="120" x2="120" y2="120" class="grid-line"/>
  </g>
  
  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(1080, 80)">
    <text x="0" y="0" class="title">BASE GRID SYSTEMS</text>
    <text x="0" y="30" class="label">Each poster follows a material-specific</text>
    <text x="0" y="45" class="label">geometric logic derived from the</text>
    <text x="0" y="60" class="label">physical properties of the material.</text>
    
    <text x="0" y="100" class="label" fill="#aaa">— Bold lines: Primary divisions</text>
    <text x="0" y="115" class="label" fill="#666">— Light lines: Secondary grid</text>
    
    <text x="0" y="150" class="title" style="font-size: 12px;">MATERIAL LOGIC:</text>
    <text x="0" y="170" class="label">• Glass: Diagonal transparency</text>
    <text x="0" y="185" class="label">• Carpets: Radial woven patterns</text>
    <text x="0" y="200" class="label">• Polycarbonate: Ribbed verticals</text>
    <text x="0" y="215" class="label">• Gold: Layered rectangular planes</text>
    <text x="0" y="230" class="label">• Bamboo: Organic vertical growth</text>
    <text x="0" y="245" class="label">• Bricks: Staggered masonry bond</text>
    <text x="0" y="260" class="label">• Ice: Fractured crystalline shards</text>
    <text x="0" y="275" class="label">• Plaster: Troweled surface texture</text>
  </g>
  
</svg>